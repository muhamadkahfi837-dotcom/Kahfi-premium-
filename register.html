<!DOCTYPE html>
<html>
<head>
    <title>Daftar - Toko Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form">
    <h2>Daftar</h2>
    <input type="text" id="newUser" placeholder="Username">
    <input type="password" id="newPass" placeholder="Password">
    <button onclick="register()">Daftar</button>
</div>

<script>
function register(){
    localStorage.setItem("user", document.getElementById("newUser").value);
    localStorage.setItem("pass", document.getElementById("newPass").value);

    alert("Berhasil daftar!");
    window.location.href="login.html";
}
</script>

</body>
</html>
