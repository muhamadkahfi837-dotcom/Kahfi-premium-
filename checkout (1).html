<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Checkout Game</h1>

<div class="checkout">
    <p>Game: <span id="game"></span></p>
    <p>Harga: Rp <span id="harga"></span></p>

    <button onclick="lanjut()">Lanjut Pembayaran</button>
</div>

<script>
document.getElementById("game").innerText = localStorage.getItem("game");
document.getElementById("harga").innerText = localStorage.getItem("harga");

function lanjut(){
    window.location.href="payment.html";
}
</script>

</body>
</html>
